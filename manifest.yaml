id: tenthoughts
title: "Ten31 Thoughts"
version: 0.3.0.1
release-notes: "Initial release of Ten31 Thoughts macro intelligence service."
license: mit
wrapper-repo: "https://github.com/smallblocks/ten31thoughts"
upstream-repo: "https://github.com/smallblocks/ten31thoughts"
support-site: "https://ten31.xyz"
marketing-site: "https://ten31timestamp.com"
build:
  - make
min-os-version: 0.3.6
description:
  short: "Macro intelligence service coordinating your thesis with external voices"
  long: "Ten31 Thoughts ingests your published macro framework alongside external macro interviews to surface the top mental models for navigating the current macro landscape."
assets:
  license: LICENSE
  icon: icon.png
  instructions: INSTRUCTIONS.md
  docker-images: image.tar
main:
  type: docker
  image: main
  entrypoint: "/usr/local/bin/uvicorn"
  args:
    - "src.app:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8431"
    - "--workers"
    - "1"
  mounts:
    main: /data
health-checks:
  web-ui:
    name: Web Interface
    success-message: Ten31 Thoughts is ready
    type: docker
    image: main
    entrypoint: "curl"
    args:
      - "-f"
      - "http://tenthoughts.embassy:8431/api/health"
    inject: true
    system: false
    io-format: json
config: ~
properties: ~
volumes:
  main:
    type: data
interfaces:
  main:
    name: Web Interface
    description: Access the Ten31 Thoughts dashboard and chat
    tor-config:
      port-mapping:
        80: "8431"
    lan-config:
      443:
        ssl: true
        internal: 8431
    ui: true
    protocols:
      - tcp
      - http
dependencies: {}
backup:
  create:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - tenthoughts
      - /mnt/backup
      - /root/data
    mounts:
      BACKUP: /mnt/backup
      main: /root/data
  restore:
    type: docker
    image: compat
    system: true
    entrypoint: compat
    args:
      - duplicity
      - tenthoughts
      - /mnt/backup
      - /root/data
    mounts:
      BACKUP: /mnt/backup
      main: /root/data
migrations:
  from:
    "*":
      type: script
      args:
        - "from"
  to:
    "*":
      type: script
      args:
        - "to"
