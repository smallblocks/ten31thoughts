name: Build Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare StartOS SDK
        uses: Start9Labs/sdk@v1

      - name: Install newer start-cli
        run: |
          # Download newer start-cli with s9pk subcommand
          wget -qO /usr/local/bin/start-cli https://github.com/Start9Labs/start-os/releases/download/v0.4.0-alpha.20/start-cli_x86_64-linux
          chmod +x /usr/local/bin/start-cli
          start-cli --version || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build x86_64 package
        run: make x86

      - name: Upload .s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenthoughts.s9pk
          path: tenthoughts*.s9pk
