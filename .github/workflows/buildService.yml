name: Build Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare StartOS SDK
        uses: Start9Labs/sdk@v1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build the service package
        id: build
        run: |
          # Build V1 package using start-sdk
          start-sdk init
          make
          
          # Install newer start-cli for V2 conversion
          wget -qO /usr/local/bin/start-cli-v2 https://github.com/Start9Labs/start-os/releases/download/v0.4.0-alpha.20/start-cli_x86_64-linux
          chmod +x /usr/local/bin/start-cli-v2
          
          # Initialize developer key and convert to V2
          start-cli-v2 init-key
          start-cli-v2 s9pk convert tenthoughts.s9pk
          
          ls -la *.s9pk
        shell: bash

      - name: Upload .s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenthoughts.s9pk
          path: tenthoughts.s9pk

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .s9pk artifact
        uses: actions/download-artifact@v4
        with:
          name: tenthoughts.s9pk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tenthoughts.s9pk
          generate_release_notes: true
