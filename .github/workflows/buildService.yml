name: Build Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install StartOS CLI
        run: |
          # Install start-cli for V2 s9pk packaging
          wget -qO /tmp/start-cli.tar.gz https://github.com/Start9Labs/start-os/releases/latest/download/start-cli-linux-x86_64.tar.gz || \
          wget -qO /tmp/start-cli.tar.gz https://github.com/Start9Labs/start-os/releases/download/v0.3.6-alpha.6/start-cli-linux-x86_64.tar.gz
          tar -xzf /tmp/start-cli.tar.gz -C /usr/local/bin/ || tar -xzf /tmp/start-cli.tar.gz -C /tmp && mv /tmp/start-cli /usr/local/bin/
          chmod +x /usr/local/bin/start-cli
          start-cli --version || echo "start-cli installed"
          # Initialize developer key for signing
          start-cli init-key

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build the service package
        id: build
        run: |
          make
        shell: bash

      - name: Upload .s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenthoughts.s9pk
          path: tenthoughts.s9pk

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .s9pk artifact
        uses: actions/download-artifact@v4
        with:
          name: tenthoughts.s9pk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tenthoughts.s9pk
          generate_release_notes: true
