name: Build Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare StartOS SDK
        uses: Start9Labs/sdk@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install npm dependencies
        run: npm install

      - name: Build TypeScript SDK
        run: npm run build

      - name: Build multi-arch Docker images
        run: |
          mkdir -p docker-images
          
          # Build x86_64
          docker buildx build \
            --tag start9/tenthoughts/main:0.3.0.1 \
            --platform=linux/amd64 \
            -o type=docker,dest=docker-images/x86_64.tar \
            .
          
          # Build aarch64
          docker buildx build \
            --tag start9/tenthoughts/main:0.3.0.1 \
            --platform=linux/arm64/v8 \
            -o type=docker,dest=docker-images/aarch64.tar \
            .

      - name: Initialize SDK and pack
        run: |
          start-sdk init
          start-sdk pack

      - name: Upload .s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenthoughts.s9pk
          path: tenthoughts.s9pk

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .s9pk artifact
        uses: actions/download-artifact@v4
        with:
          name: tenthoughts.s9pk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tenthoughts.s9pk
          generate_release_notes: true
