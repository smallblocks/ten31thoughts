name: Build Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare StartOS SDK
        uses: Start9Labs/sdk@v1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build the service package
        id: build
        run: |
          # Initialize for V2 packaging
          start-cli init-key
          # Build Docker image
          make image.tar
          # Pack using start-cli for V2 format
          start-cli s9pk pack --icon icon.png -o tenthoughts.s9pk
        shell: bash

      - name: Upload .s9pk artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenthoughts.s9pk
          path: tenthoughts.s9pk

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .s9pk artifact
        uses: actions/download-artifact@v4
        with:
          name: tenthoughts.s9pk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tenthoughts.s9pk
          generate_release_notes: true
